name = "Neon Dark"

[vars]
# Base palette
bg         = "#0a0a12"
base       = "#0a0a12"
mantle     = "#06060e"
crust      = "#030308"
surface0   = "#14141f"
surface1   = "#1e1e2e"
surface2   = "#28283a"
overlay0   = "#505080"
overlay1   = "#7070a0"
overlay2   = "#9090c0"
text       = "#e0e0ff"
subtext0   = "#a0a0d0"
subtext1   = "#c0c0e8"

# Neon accent colors
blue       = "#00d4ff"
lavender   = "#9d4edd"
green      = "#39ff14"
red        = "#ff2d78"
yellow     = "#f0ff00"
mauve      = "#bf00ff"
peach      = "#ff6b00"
teal       = "#00ffcc"
sky        = "#00bfff"

# Semantic tokens
accent     = "#00d4ff"
accent-dim = "#001e30"
bg-card    = "#14141f"
border     = "#1e1e3a"
text2      = "#c0c0e8"
text-muted    = "#505080"
toggle-track  = "#1e1e3a"
toggle-thumb  = "#7070a0"

# Typography
mono = "'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace"
sans = "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
